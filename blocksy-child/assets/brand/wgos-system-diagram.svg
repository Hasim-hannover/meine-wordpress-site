<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wgos-diagram-title wgos-diagram-desc" font-family="Figtree, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title id="wgos-diagram-title">WGOS Systemdiagramm</title>
  <desc id="wgos-diagram-desc">Sechs WGOS-Bereiche in drei Phasen: Strategie, Technisches Fundament, Messbarkeit, Sichtbarkeit, Conversion und Weiterentwicklung.</desc>
  <defs>
    <linearGradient id="wgosCopperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-start, #d0692b)"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-end, #e09a5a)"/>
    </linearGradient>
    <marker id="wgosArrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="var(--wgos-diagram-copper-start, #d0692b)" opacity="0.7"/>
    </marker>
    <filter id="wgosCardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="var(--wgos-diagram-shadow, #000000)" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="960" height="520" rx="18" fill="var(--wgos-diagram-bg, #171516)"/>

  <g opacity="0.12" stroke="var(--wgos-diagram-grid, #7d6d5b)" stroke-width="0.5">
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="520"/>
    <line x1="640" y1="0" x2="640" y2="520"/>
  </g>

  <text x="480" y="42" text-anchor="middle" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="11" font-weight="700" letter-spacing="2.5">WORDPRESS GROWTH OPERATING SYSTEM</text>

  <text x="175" y="80" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 01 - BASIS</text>
  <text x="480" y="80" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 02 - AUFBAU</text>
  <text x="785" y="80" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 03 - WACHSTUM</text>

  <line x1="310" y1="260" x2="350" y2="260" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="2" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#wgosArrow)"/>
  <line x1="615" y1="260" x2="655" y2="260" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="2" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#wgosArrow)"/>

  <g filter="url(#wgosCardShadow)">
    <rect x="40" y="100" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="40" y="100" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="60" y="132" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">01</text>
    <text x="60" y="158" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Strategie</text>
    <text x="60" y="182" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="60" dy="0">Zielbild, Angebotslogik und Prioritäten</tspan>
      <tspan x="60" dy="18">setzen die Richtung.</tspan>
    </text>
    <rect x="60" y="212" width="84" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="102" y="227" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Richtung</text>
  </g>

  <g filter="url(#wgosCardShadow)">
    <rect x="40" y="265" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="40" y="265" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="60" y="297" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">02</text>
    <text x="60" y="323" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Technisches Fundament</text>
    <text x="60" y="347" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="60" dy="0">Performance, Stabilität und Sicherheit</tspan>
      <tspan x="60" dy="18">als Tragfähigkeit für alles Weitere.</tspan>
    </text>
    <rect x="60" y="377" width="84" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="102" y="392" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Stabilität</text>
  </g>

  <line x1="175" y1="245" x2="175" y2="265" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.35"/>

  <g filter="url(#wgosCardShadow)">
    <rect x="345" y="100" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="345" y="100" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="365" y="132" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">03</text>
    <text x="365" y="158" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Messbarkeit</text>
    <text x="365" y="182" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="365" dy="0">Tracking, Consent und Datenqualitaet</tspan>
      <tspan x="365" dy="18">für belastbare Entscheidungen.</tspan>
    </text>
    <rect x="365" y="212" width="62" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="396" y="227" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Daten</text>
  </g>

  <g filter="url(#wgosCardShadow)">
    <rect x="345" y="265" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="345" y="265" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="365" y="297" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">04</text>
    <text x="365" y="323" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Sichtbarkeit</text>
    <text x="365" y="347" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="365" dy="0">SEO, Content und Seitenstruktur</tspan>
      <tspan x="365" dy="18">bauen kaufnahe Nachfrage auf.</tspan>
    </text>
    <rect x="365" y="377" width="88" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="409" y="392" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Nachfrage</text>
  </g>

  <line x1="480" y1="245" x2="480" y2="265" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.35"/>

  <g filter="url(#wgosCardShadow)">
    <rect x="650" y="100" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="650" y="100" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="670" y="132" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">05</text>
    <text x="670" y="158" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Conversion</text>
    <text x="670" y="182" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="670" dy="0">Nutzerführung, Proof und CTAs</tspan>
      <tspan x="670" dy="18">führen Besucher zur Anfrage.</tspan>
    </text>
    <rect x="670" y="212" width="80" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="710" y="227" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Anfragen</text>
  </g>

  <g filter="url(#wgosCardShadow)">
    <rect x="650" y="265" width="270" height="145" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="650" y="265" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <text x="670" y="297" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">06</text>
    <text x="670" y="323" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Weiterentwicklung</text>
    <text x="670" y="347" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="670" dy="0">Optimierung auf Basis echter Signale.</tspan>
      <tspan x="670" dy="18">Das System wird kontrolliert besser.</tspan>
    </text>
    <rect x="670" y="377" width="98" height="22" rx="4" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.5" opacity="0.75"/>
    <text x="719" y="392" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Steuerung</text>
  </g>

  <line x1="785" y1="245" x2="785" y2="265" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.35"/>

  <path d="M 650 430 L 650 465 Q 650 480 635 480 L 55 480 Q 40 480 40 465 L 40 430" fill="none" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.32" marker-start="url(#wgosArrow)"/>
  <text x="345" y="495" text-anchor="middle" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="10" font-weight="600" opacity="0.55" letter-spacing="1">KONTINUIERLICHE OPTIMIERUNG</text>
</svg>
