<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wgos-diagram-title wgos-diagram-desc" font-family="Figtree, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title id="wgos-diagram-title">WGOS Systemdiagramm</title>
  <desc id="wgos-diagram-desc">Sechs WGOS-Bereiche in drei Phasen: Strategie, Technisches Fundament, Messbarkeit, Sichtbarkeit, Conversion und Weiterentwicklung.</desc>

  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    @keyframes orbPulse {
      0%, 100% { r: 4; opacity: 0.9; }
      50% { r: 6; opacity: 1; }
    }
    @keyframes dashFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes feedbackFlow {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes glowBreath {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.22; }
    }
    .wgos-orb { animation: orbPulse 3s ease-in-out infinite; }
    .wgos-orb-2 { animation: orbPulse 3s ease-in-out 1s infinite; }
    .wgos-orb-3 { animation: orbPulse 3s ease-in-out 2s infinite; }
    .wgos-dash-flow { animation: dashFlow 1.5s linear infinite; }
    .wgos-dash-flow-2 { animation: dashFlow 1.5s linear 0.5s infinite; }
    .wgos-feedback-path { animation: feedbackFlow 3s linear infinite; }
    .wgos-card-glow { animation: glowBreath 4s ease-in-out infinite; }
    .wgos-card-glow-2 { animation: glowBreath 4s ease-in-out 1.3s infinite; }
    .wgos-card-glow-3 { animation: glowBreath 4s ease-in-out 2.6s infinite; }
    .wgos-title-glow { animation: pulseGlow 5s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="wgosCopperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-start, #d0692b)"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-end, #e09a5a)"/>
    </linearGradient>
    <linearGradient id="wgosCopperGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-start, #d0692b)"/>
      <stop offset="50%" stop-color="var(--wgos-diagram-copper-end, #e09a5a)"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-start, #d0692b)"/>
    </linearGradient>
    <radialGradient id="wgosOrbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-end, #e09a5a)" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-end, #e09a5a)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wgosTitleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-start, #d0692b)" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="var(--wgos-diagram-copper-start, #d0692b)" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-start, #d0692b)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wgosCardGlow1" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="var(--wgos-diagram-copper-start, #d0692b)" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="var(--wgos-diagram-copper-start, #d0692b)" stop-opacity="0"/>
    </radialGradient>
    <marker id="wgosArrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="var(--wgos-diagram-copper-start, #d0692b)" opacity="0.85"/>
    </marker>
    <marker id="wgosArrowGlow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="12" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="var(--wgos-diagram-copper-end, #e09a5a)"/>
    </marker>
    <filter id="wgosCardShadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--wgos-diagram-shadow, #000000)" flood-opacity="0.35"/>
    </filter>
    <filter id="wgosGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wgosSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" rx="18" fill="var(--wgos-diagram-bg, #171516)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.1" fill="var(--wgos-diagram-grid, #7d6d5b)">
    <g>
      <circle cx="80" cy="60" r="1"/><circle cx="160" cy="60" r="1"/><circle cx="240" cy="60" r="1"/><circle cx="320" cy="60" r="1"/><circle cx="400" cy="60" r="1"/><circle cx="480" cy="60" r="1"/><circle cx="560" cy="60" r="1"/><circle cx="640" cy="60" r="1"/><circle cx="720" cy="60" r="1"/><circle cx="800" cy="60" r="1"/><circle cx="880" cy="60" r="1"/>
      <circle cx="80" cy="140" r="1"/><circle cx="160" cy="140" r="1"/><circle cx="240" cy="140" r="1"/><circle cx="320" cy="140" r="1"/><circle cx="400" cy="140" r="1"/><circle cx="480" cy="140" r="1"/><circle cx="560" cy="140" r="1"/><circle cx="640" cy="140" r="1"/><circle cx="720" cy="140" r="1"/><circle cx="800" cy="140" r="1"/><circle cx="880" cy="140" r="1"/>
      <circle cx="80" cy="220" r="1"/><circle cx="160" cy="220" r="1"/><circle cx="240" cy="220" r="1"/><circle cx="320" cy="220" r="1"/><circle cx="400" cy="220" r="1"/><circle cx="480" cy="220" r="1"/><circle cx="560" cy="220" r="1"/><circle cx="640" cy="220" r="1"/><circle cx="720" cy="220" r="1"/><circle cx="800" cy="220" r="1"/><circle cx="880" cy="220" r="1"/>
      <circle cx="80" cy="300" r="1"/><circle cx="160" cy="300" r="1"/><circle cx="240" cy="300" r="1"/><circle cx="320" cy="300" r="1"/><circle cx="400" cy="300" r="1"/><circle cx="480" cy="300" r="1"/><circle cx="560" cy="300" r="1"/><circle cx="640" cy="300" r="1"/><circle cx="720" cy="300" r="1"/><circle cx="800" cy="300" r="1"/><circle cx="880" cy="300" r="1"/>
      <circle cx="80" cy="380" r="1"/><circle cx="160" cy="380" r="1"/><circle cx="240" cy="380" r="1"/><circle cx="320" cy="380" r="1"/><circle cx="400" cy="380" r="1"/><circle cx="480" cy="380" r="1"/><circle cx="560" cy="380" r="1"/><circle cx="640" cy="380" r="1"/><circle cx="720" cy="380" r="1"/><circle cx="800" cy="380" r="1"/><circle cx="880" cy="380" r="1"/>
      <circle cx="80" cy="460" r="1"/><circle cx="160" cy="460" r="1"/><circle cx="240" cy="460" r="1"/><circle cx="320" cy="460" r="1"/><circle cx="400" cy="460" r="1"/><circle cx="480" cy="460" r="1"/><circle cx="560" cy="460" r="1"/><circle cx="640" cy="460" r="1"/><circle cx="720" cy="460" r="1"/><circle cx="800" cy="460" r="1"/><circle cx="880" cy="460" r="1"/>
    </g>
  </g>

  <!-- Phase separator lines (subtle vertical) -->
  <line x1="325" y1="70" x2="325" y2="440" stroke="var(--wgos-diagram-grid, #7d6d5b)" stroke-width="0.5" opacity="0.08"/>
  <line x1="635" y1="70" x2="635" y2="440" stroke="var(--wgos-diagram-grid, #7d6d5b)" stroke-width="0.5" opacity="0.08"/>

  <!-- Title glow -->
  <ellipse cx="480" cy="42" rx="220" ry="30" fill="url(#wgosTitleGlow)" class="wgos-title-glow"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="url(#wgosCopperGradH)" font-size="11.5" font-weight="700" letter-spacing="3">WORDPRESS GROWTH OPERATING SYSTEM</text>

  <!-- Phase headers with copper underline -->
  <text x="175" y="82" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 01 - BASIS</text>
  <line x1="100" y1="90" x2="250" y2="90" stroke="url(#wgosCopperGrad)" stroke-width="1.5" opacity="0.25"/>

  <text x="480" y="82" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 02 - AUFBAU</text>
  <line x1="400" y1="90" x2="560" y2="90" stroke="url(#wgosCopperGrad)" stroke-width="1.5" opacity="0.25"/>

  <text x="785" y="82" text-anchor="middle" fill="var(--wgos-diagram-muted, #8f877d)" font-size="11" font-weight="600" letter-spacing="1.5">PHASE 03 - WACHSTUM</text>
  <line x1="700" y1="90" x2="870" y2="90" stroke="url(#wgosCopperGrad)" stroke-width="1.5" opacity="0.25"/>

  <!-- ==================== PHASE TRANSITION ARROWS ==================== -->

  <!-- Arrow Phase 1 → 2 -->
  <line x1="312" y1="280" x2="342" y2="280" stroke="url(#wgosCopperGrad)" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7" marker-end="url(#wgosArrowGlow)" class="wgos-dash-flow"/>
  <!-- Glow behind arrow -->
  <ellipse cx="327" cy="280" rx="20" ry="12" fill="url(#wgosOrbGlow)" opacity="0.3"/>

  <!-- Arrow Phase 2 → 3 -->
  <line x1="617" y1="280" x2="647" y2="280" stroke="url(#wgosCopperGrad)" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7" marker-end="url(#wgosArrowGlow)" class="wgos-dash-flow-2"/>
  <ellipse cx="632" cy="280" rx="20" ry="12" fill="url(#wgosOrbGlow)" opacity="0.3"/>

  <!-- ==================== CARD 01: STRATEGIE ==================== -->
  <!-- Card glow -->
  <ellipse cx="175" cy="160" rx="150" ry="80" fill="url(#wgosCardGlow1)" class="wgos-card-glow" filter="url(#wgosSoftGlow)"/>
  <g filter="url(#wgosCardShadow)">
    <rect x="40" y="110" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <!-- Copper top accent bar with glow -->
    <rect x="40" y="110" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="60" y="109" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="60" y="142" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">01</text>
    <text x="60" y="168" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Strategie</text>
    <text x="60" y="192" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="60" dy="0">Zielbild, Angebotslogik und Prioritäten</tspan>
      <tspan x="60" dy="18">setzen die Richtung.</tspan>
    </text>
    <rect x="60" y="222" width="84" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="102" y="238" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Richtung</text>
  </g>

  <!-- Vertical connector 01 → 02 with orb -->
  <line x1="175" y1="260" x2="175" y2="280" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="175" cy="270" r="4" fill="var(--wgos-diagram-copper-end, #e09a5a)" class="wgos-orb"/>
  <circle cx="175" cy="270" r="10" fill="url(#wgosOrbGlow)" opacity="0.5"/>

  <!-- ==================== CARD 02: TECHNISCHES FUNDAMENT ==================== -->
  <g filter="url(#wgosCardShadow)">
    <rect x="40" y="280" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="40" y="280" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="60" y="279" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="60" y="312" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">02</text>
    <text x="60" y="338" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Technisches Fundament</text>
    <text x="60" y="362" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="60" dy="0">Performance, Stabilität und Sicherheit</tspan>
      <tspan x="60" dy="18">als Tragfähigkeit für alles Weitere.</tspan>
    </text>
    <rect x="60" y="392" width="84" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="102" y="408" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Stabilität</text>
  </g>

  <!-- ==================== CARD 03: MESSBARKEIT ==================== -->
  <ellipse cx="480" cy="160" rx="150" ry="80" fill="url(#wgosCardGlow1)" class="wgos-card-glow-2" filter="url(#wgosSoftGlow)"/>
  <g filter="url(#wgosCardShadow)">
    <rect x="345" y="110" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="345" y="110" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="365" y="109" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="365" y="142" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">03</text>
    <text x="365" y="168" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Messbarkeit</text>
    <text x="365" y="192" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="365" dy="0">Tracking, Consent und Datenqualität</tspan>
      <tspan x="365" dy="18">für belastbare Entscheidungen.</tspan>
    </text>
    <rect x="365" y="222" width="62" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="396" y="238" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Daten</text>
  </g>

  <!-- Vertical connector 03 → 04 with orb -->
  <line x1="480" y1="260" x2="480" y2="280" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="480" cy="270" r="4" fill="var(--wgos-diagram-copper-end, #e09a5a)" class="wgos-orb-2"/>
  <circle cx="480" cy="270" r="10" fill="url(#wgosOrbGlow)" opacity="0.5"/>

  <!-- ==================== CARD 04: SICHTBARKEIT ==================== -->
  <g filter="url(#wgosCardShadow)">
    <rect x="345" y="280" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="345" y="280" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="365" y="279" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="365" y="312" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">04</text>
    <text x="365" y="338" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Sichtbarkeit</text>
    <text x="365" y="362" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="365" dy="0">SEO, Content und Seitenstruktur</tspan>
      <tspan x="365" dy="18">bauen kaufnahe Nachfrage auf.</tspan>
    </text>
    <rect x="365" y="392" width="88" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="409" y="408" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Nachfrage</text>
  </g>

  <!-- ==================== CARD 05: CONVERSION ==================== -->
  <ellipse cx="785" cy="160" rx="150" ry="80" fill="url(#wgosCardGlow1)" class="wgos-card-glow-3" filter="url(#wgosSoftGlow)"/>
  <g filter="url(#wgosCardShadow)">
    <rect x="650" y="110" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="650" y="110" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="670" y="109" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="670" y="142" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">05</text>
    <text x="670" y="168" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Conversion</text>
    <text x="670" y="192" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="670" dy="0">Nutzerführung, Proof und CTAs</tspan>
      <tspan x="670" dy="18">führen Besucher zur Anfrage.</tspan>
    </text>
    <rect x="670" y="222" width="80" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="710" y="238" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Anfragen</text>
  </g>

  <!-- Vertical connector 05 → 06 with orb -->
  <line x1="785" y1="260" x2="785" y2="280" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="785" cy="270" r="4" fill="var(--wgos-diagram-copper-end, #e09a5a)" class="wgos-orb-3"/>
  <circle cx="785" cy="270" r="10" fill="url(#wgosOrbGlow)" opacity="0.5"/>

  <!-- ==================== CARD 06: WEITERENTWICKLUNG ==================== -->
  <g filter="url(#wgosCardShadow)">
    <rect x="650" y="280" width="270" height="150" rx="14" fill="var(--wgos-diagram-card, #211d1a)" stroke="var(--wgos-diagram-border, #56473d)" stroke-width="1"/>
    <rect x="650" y="280" width="270" height="3" rx="1.5" fill="url(#wgosCopperGrad)"/>
    <rect x="670" y="279" width="230" height="4" rx="2" fill="url(#wgosCopperGrad)" opacity="0.3" filter="url(#wgosSoftGlow)"/>
    <text x="670" y="312" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="13" font-weight="700" opacity="0.7">06</text>
    <text x="670" y="338" fill="var(--wgos-diagram-text, #f5f1ea)" font-size="18" font-weight="700">Weiterentwicklung</text>
    <text x="670" y="362" fill="var(--wgos-diagram-muted, #8f877d)" font-size="12">
      <tspan x="670" dy="0">Optimierung auf Basis echter Signale.</tspan>
      <tspan x="670" dy="18">Das System wird kontrolliert besser.</tspan>
    </text>
    <rect x="670" y="392" width="98" height="24" rx="12" fill="var(--wgos-diagram-tag-bg, #2a2520)" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="0.7" opacity="0.8"/>
    <text x="719" y="408" text-anchor="middle" fill="var(--wgos-diagram-copper-end, #e09a5a)" font-size="10" font-weight="600">Steuerung</text>
  </g>

  <!-- ==================== FEEDBACK LOOP ==================== -->
  <!-- Glow behind feedback loop -->
  <path d="M 650 450 L 650 490 Q 650 505 635 505 L 55 505 Q 40 505 40 490 L 40 450" fill="none" stroke="var(--wgos-diagram-copper-start, #d0692b)" stroke-width="6" opacity="0.06" filter="url(#wgosSoftGlow)"/>
  <!-- Main feedback path -->
  <path d="M 650 450 L 650 490 Q 650 505 635 505 L 55 505 Q 40 505 40 490 L 40 450" fill="none" stroke="url(#wgosCopperGrad)" stroke-width="1.8" stroke-dasharray="8,5" opacity="0.45" marker-start="url(#wgosArrow)" class="wgos-feedback-path"/>

  <!-- Feedback orbs along the path -->
  <circle cx="345" cy="505" r="3" fill="var(--wgos-diagram-copper-end, #e09a5a)" opacity="0.5" class="wgos-orb-2"/>
  <circle cx="345" cy="505" r="8" fill="url(#wgosOrbGlow)" opacity="0.3"/>

  <!-- Feedback label with glow -->
  <rect x="280" y="520" width="230" height="24" rx="12" fill="var(--wgos-diagram-bg, #171516)" opacity="0.9"/>
  <text x="395" y="536" text-anchor="middle" fill="var(--wgos-diagram-copper-start, #d0692b)" font-size="10" font-weight="700" opacity="0.65" letter-spacing="1.5">KONTINUIERLICHE OPTIMIERUNG</text>
</svg>
