name: Deploy Theme (SSH)

on:
  push:
    branches:
      - main
      - 'hotfix/**'
    paths:
      - 'blocksy-child/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify CSS & JS
        run: |
          npm install --no-save lightningcss-cli terser
          # CSS minification
          find blocksy-child/assets/css -name '*.css' ! -name '*.min.css' -exec sh -c '
            npx lightningcss --minify --bundle "$1" -o "$1"
          ' _ {} \;
          # Minify style.css (preserve header comment)
          if [ -f blocksy-child/style.css ]; then
            npx lightningcss --minify blocksy-child/style.css -o blocksy-child/style.css
          fi
          # JS minification
          find blocksy-child/assets/js -name '*.js' ! -name '*.min.js' -exec sh -c '
            npx terser "$1" --compress --mangle -o "$1"
          ' _ {} \;

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -p 22 -o StrictHostKeyChecking=yes" \
            ./blocksy-child/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:www/wp-content/themes/blocksy-child/"
